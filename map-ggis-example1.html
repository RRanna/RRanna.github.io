        const baseMap = {"id":"dark","name":"CartoDB Dark","url":"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png","attribution":"&copy; CartoDB"};

        const map = L.map('map', {
            center: [-15.78,-47.93],
            zoom: 4,
            zoomControl: true
        });

        L.tileLayer(baseMap.url, {
            attribution: baseMap.attribution

        const leafletLayers = {};

        function interpolateColor(c1, c2, f) {
            const hexToRgb = (hex) => {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return [r, g, b];
            };
            const rgbToHex = (r, g, b) => 
                '#' + [r, g, b].map(x => Math.round(x).toString(16).padStart(2, '0')).join('');
            
            const rgb1 = hexToRgb(c1.startsWith('#') ? c1 : '#000000');
            const rgb2 = hexToRgb(c2.startsWith('#') ? c2 : '#000000');
            
            return rgbToHex(
                rgb1[0] + (rgb2[0] - rgb1[0]) * f,
                rgb1[1] + (rgb2[1] - rgb1[1]) * f,
                rgb1[2] + (rgb2[2] - rgb1[2]) * f
            );
        }

        function interpolateStyle(s1, s2, f) {
            const res = { ...s1 };
            Object.keys(s2).forEach(key => {
                const v1 = s1[key] ?? s2[key];
                const v2 = s2[key] ?? s1[key];
                if (typeof v1 === 'number' && typeof v2 === 'number') {
                    res[key] = v1 + (v2 - v1) * f;
                } else if (key.toLowerCase().includes('color') && typeof v1 === 'string' && typeof v2 === 'string') {
                    res[key] = interpolateColor(v1, v2, f);
                } else {
                    res[key] = f < 0.5 ? v1 : v2;
                }
            });
            return res;
        }

        function getFeatureStyle(layer, feature) {
            let style = { ...layer.baseStyle };
            if (layer.symbologyType === 'categorized' && layer.attributeField) {
                const val = feature.properties[layer.attributeField];
                const mapping = layer.categories.find(c => c.value === val);
                if (mapping) style = { ...style, ...mapping.style };
            } else if (layer.symbologyType === 'classified' && layer.attributeField) {
                const val = Number(feature.properties[layer.attributeField]);
                const breakMatch = layer.classes.find(b => val >= b.min && val <= b.max);
                if (breakMatch) style = { ...style, ...breakMatch.style };
            }

            Object.entries(layer.proportional).forEach(([prop, settings]) => {
                if (settings.enabled && settings.attribute) {
                    const val = Number(feature.properties[settings.attribute]);
                    if (!isNaN(val)) {
                        const ratio = Math.max(0, Math.min(1, (val - settings.minVal) / (settings.maxVal - settings.minVal || 1)));
                        style[prop] = settings.minScale + ratio * (settings.maxScale - settings.minScale);
                    }
                }
            });

            return style;
        }

        function applyFilters(el, style) {
            if (!el) return;
            const filters = [
                `brightness(${style.brightness})`,
                `contrast(${style.contrast})`,
                `saturate(${style.saturate})`,
                `hue-rotate(${style.hueRotate}deg)`,
                `invert(${style.invert})`,
                `grayscale(${style.grayscale})`,
                `sepia(${style.sepia})`,
                `blur(${style.blur}px)`,
                `drop-shadow(${style.shadowOffsetX}px ${style.shadowOffsetY}px ${style.glowIntensity}px ${style.shadowColor || style.fillColor})`
            ].join(' ');
            el.style.filter = filters;
            if (style.dashSpeed > 0) el.style.animationDuration = `${21 - style.dashSpeed * 2}s`;
            if (style.glowPulse) {
                el.style.setProperty('--glow-color', style.shadowColor || style.fillColor);
                el.style.setProperty('--pulse-speed', `${5 - style.glowPulseSpeed}s`);
            }
        }

        function createIcon(style) {
            const iconName = style.iconName || 'map-pin';
            const size = style.iconSize || 24;
            const color = style.fillColor || '#3b82f6';
            const opacity = style.fillOpacity || 1;
            
            const html = `
                <div class="icon-container" style="color: ${color}; width: ${size}px; height: ${size}px; opacity: ${opacity};">
                    <i data-lucide="${iconName.toLowerCase()}" style="width: ${size}px; height: ${size}px;"></i>
                </div>
            `;
            
            return L.divIcon({
                html: html,
                className: '',
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2]
            });
        }

        layersData.forEach(layer => {
            const geojson = L.geoJSON(layer.data, {
                style: (f) => {
                    const s = getFeatureStyle(layer, f);
                    return {
                        ...s,
                        className: (s.dashSpeed > 0 ? 'marching-ants ' : '') + (s.glowPulse ? 'glow-pulsing' : '')
                    };
                },
                pointToLayer: (f, latlng) => {
                    const s = getFeatureStyle(layer, f);
                    if (s.useIcon) {
                        return L.marker(latlng, { icon: createIcon(s) });
                    }
                    return L.circleMarker(latlng, s);
                },
                onEachFeature: (f, l) => {
                    if (f.properties) {
                        l.bindPopup(`<div class="popup-content"><div class="popup-title">${layer.name}</div>${Object.entries(f.properties).map(([k,v]) => `<div><strong>${k}:</strong> ${v}</div>`).join('')}</div>`);
                    }
                    setTimeout(() => {
                        const el = l._path || l._renderer?._container || l._icon;
                        applyFilters(el, getFeatureStyle(layer, f));
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                    }, 0);
                }
            }).addTo(map);
            leafletLayers[layer.id] = geojson;
            if (layersData.length === 1) map.fitBounds(geojson.getBounds());
        });

        // Animation Loop
        const animationState = {};
        function animate(time) {
            layersData.forEach(layer => {
                if (!layer.animation || !layer.animation.enabled || layer.animation.keyframes.length < 2) return;
                
                if (!animationState[layer.id]) animationState[layer.id] = { startTime: time };
                const elapsed = (time - animationState[layer.id].startTime) / 1000;
                const kfs = layer.animation.keyframes;
                const duration = kfs[kfs.length - 1].time;
                
                let currTime = elapsed;
                if (layer.animation.loop) currTime = elapsed % duration;
                else if (elapsed >= duration) return;

                let cKf = kfs[0], nKf = kfs[1];
                for (let i = 0; i < kfs.length - 1; i++) {
                    if (currTime >= kfs[i].time && currTime <= kfs[i+1].time) {
                        cKf = kfs[i]; nKf = kfs[i+1]; break;
                    }
                }

                const factor = (currTime - cKf.time) / (nKf.time - cKf.time || 1);
                const currentBaseStyle = interpolateStyle(cKf.style, nKf.style, factor);
                
                // Update leaflet layer
                const lLayer = leafletLayers[layer.id];
                lLayer.eachLayer(l => {
                    const f = l.feature;
                    const baseS = { ...layer.baseStyle, ...currentBaseStyle };
                    const tempLayer = { ...layer, baseStyle: baseS };
                    const s = getFeatureStyle(tempLayer, f);
                    
                    if (l.setStyle) {
                        l.setStyle({
                            ...s,
                            className: (s.dashSpeed > 0 ? 'marching-ants ' : '') + (s.glowPulse ? 'glow-pulsing' : '')
                        });
                    }
                    
                    if (s.useIcon && l.setIcon) {
                        l.setIcon(createIcon(s));
                        if (typeof lucide !== 'undefined') lucide.createIcons();
                    }

                    const el = l._path || l._renderer?._container || l._icon;
                    applyFilters(el, s);
                });
            });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
